<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÉtanchéiCheck — Calculateur d'étanchéité</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#F2EEE7;min-height:100vh;padding-bottom:60px;}

/* HEADER */
.header{background:#1A2035;padding:18px 24px;border-bottom:3px solid #E07B39;}
.header-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;gap:14px;}
.logo{background:#E07B39;width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:4px;flex-shrink:0;}
.header-eyebrow{color:#E07B39;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:2px;}
.header-title{color:#fff;font-size:17px;font-weight:700;}

/* STEPS */
.steps{background:#fff;border-bottom:1px solid #E0DBD2;}
.steps-inner{max-width:720px;margin:0 auto;display:flex;}
.step-tab{flex:1;padding:12px 6px;text-align:center;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;border-bottom:2px solid transparent;cursor:default;color:#9E9890;transition:all .2s;}
.step-tab.active{color:#E07B39;border-bottom-color:#E07B39;}
.step-tab.done{color:#1A2035;cursor:pointer;}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;font-size:11px;margin-right:5px;background:#D5D0C8;color:#888;}
.step-tab.active .step-num{background:#E07B39;color:#fff;}
.step-tab.done .step-num{background:#1A2035;color:#fff;}

/* WRAP */
.wrap{max-width:720px;margin:0 auto;padding:28px 20px 0;}
h2{font-size:20px;font-weight:700;color:#1A2035;margin-bottom:4px;}
.subtitle{font-size:14px;color:#6B6560;margin-bottom:22px;}

/* MODE SELECTOR */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.mode-btn{background:#fff;border:2px solid #E0DBD2;border-radius:8px;padding:16px;cursor:pointer;text-align:left;transition:all .15s;}
.mode-btn:hover{border-color:#E07B39;}
.mode-btn.selected{background:#1A2035;border-color:#E07B39;}
.mode-btn .mode-icon{font-size:28px;margin-bottom:8px;}
.mode-btn .mode-label{font-size:14px;font-weight:700;color:#1A2035;margin-bottom:3px;}
.mode-btn .mode-desc{font-size:12px;color:#8A857E;}
.mode-btn.selected .mode-label{color:#fff;}
.mode-btn.selected .mode-desc{color:#9DAABB;}
.renov-sub{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.renov-btn{background:#fff;border:2px solid #E0DBD2;border-radius:8px;padding:14px;cursor:pointer;text-align:left;transition:all .15s;}
.renov-btn.selected{background:#E07B39;border-color:#E07B39;}
.renov-btn .renov-label{font-size:13px;font-weight:700;color:#1A2035;}
.renov-btn .renov-detail{font-size:12px;color:#8A857E;margin-top:3px;line-height:1.4;}
.renov-btn.selected .renov-label,.renov-btn.selected .renov-detail{color:#fff;}
.warn-renov{background:#FFF3CD;border:1px solid #F0C060;border-radius:8px;padding:12px 14px;font-size:13px;color:#7A5A10;line-height:1.5;margin-bottom:20px;display:flex;gap:10px;}

/* ROOF GRID */
.roof-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.roof-btn{background:#fff;border:2px solid #E0DBD2;border-radius:8px;padding:14px;cursor:pointer;text-align:left;transition:all .15s;}
.roof-btn:hover{border-color:#E07B39;}
.roof-btn.selected{background:#1A2035;border-color:#E07B39;}
.roof-icon{width:50px;height:32px;margin-bottom:8px;}
.roof-icon svg{width:100%;height:100%;}
.roof-btn .roof-label{font-size:14px;font-weight:700;color:#1A2035;margin-bottom:2px;}
.roof-btn .roof-desc{font-size:12px;color:#8A857E;}
.roof-btn.selected .roof-label{color:#fff;}
.roof-btn.selected .roof-desc{color:#9DAABB;}
.roof-btn.selected .roof-icon svg{color:#E07B39;}

/* FIELDS */
.fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
.fields-grid.single{grid-template-columns:1fr;}
.field-label{display:block;font-size:12px;font-weight:600;color:#1A2035;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;}
.accent{color:#E07B39;}
input[type=number]{width:100%;padding:12px 14px;font-size:15px;border:2px solid #D5D0C8;border-radius:6px;background:#fff;outline:none;font-weight:600;color:#1A2035;transition:border-color .15s;}
input[type=number]:focus,input[type=number].filled{border-color:#1A2035;}
.hint{font-size:11px;color:#9E9890;margin-top:4px;}

/* OPTIONS BOX */
.options-box{background:#fff;border:1px solid #E0DBD2;border-radius:8px;padding:18px 20px;margin-bottom:14px;}
.options-title{font-size:12px;font-weight:700;color:#1A2035;margin-bottom:14px;text-transform:uppercase;letter-spacing:.08em;}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.toggle-row{display:flex;gap:8px;}
.toggle-btn{flex:1;padding:9px;font-size:13px;font-weight:700;border:2px solid #D5D0C8;background:#fff;color:#1A2035;border-radius:6px;cursor:pointer;transition:all .15s;}
.toggle-btn.active{border-color:#E07B39;background:#E07B39;color:#fff;}
.toggle-btn.active-dark{border-color:#1A2035;background:#1A2035;color:#fff;}
.chip-row{display:flex;gap:8px;flex-wrap:wrap;}
.chip{padding:7px 13px;font-size:12px;font-weight:600;border:2px solid #D5D0C8;background:#fff;color:#1A2035;border-radius:6px;cursor:pointer;transition:all .15s;}
.chip.active{border-color:#1A2035;background:#1A2035;color:#fff;}

/* RESULTS */
.res-dark{background:#1A2035;border-radius:10px;padding:20px 22px;margin-bottom:16px;}
.res-eyebrow{font-size:11px;font-weight:700;color:#E07B39;letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px;}
.res-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.res-card{background:rgba(255,255,255,0.07);border-radius:6px;padding:12px 14px;}
.res-card.hl{background:#E07B39;}
.res-card-lbl{font-size:10px;color:#7A8899;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.res-card.hl .res-card-lbl{color:rgba(255,255,255,0.8);}
.res-card-val{font-size:19px;font-weight:800;color:#fff;}

.mat-box{background:#fff;border:1px solid #E0DBD2;border-radius:10px;overflow:hidden;margin-bottom:16px;}
.mat-header{background:#F7F4EF;padding:12px 20px;font-size:11px;font-weight:700;color:#1A2035;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid #E0DBD2;}
.mat-row{display:flex;justify-content:space-between;align-items:center;padding:13px 20px;border-bottom:1px solid #F0ECE5;}
.mat-row:last-child{border-bottom:none;}
.mat-lbl{font-size:14px;font-weight:600;color:#1A2035;}
.mat-detail{font-size:12px;color:#9E9890;margin-top:2px;}
.mat-val{font-size:16px;font-weight:800;color:#E07B39;white-space:nowrap;text-align:right;}
.mat-sub{font-size:11px;color:#B09080;font-weight:500;margin-top:1px;}



/* WARNING */
.warn-box{background:#FFF8F0;border:1px solid #F0C080;border-radius:8px;padding:14px 16px;display:flex;gap:12px;margin-bottom:16px;}
.warn-text{font-size:13px;color:#7A5A20;line-height:1.5;}
.info-box{background:#EEF4FF;border:1px solid #BDD0F0;border-radius:8px;padding:14px 16px;display:flex;gap:12px;margin-bottom:16px;}
.info-text{font-size:13px;color:#2A4A80;line-height:1.5;}

/* NAV */
.nav{margin-top:24px;display:flex;gap:12px;margin-bottom:10px;}
.btn-back{flex:1;padding:14px;background:transparent;border:2px solid #D5D0C8;color:#6B6560;font-size:14px;font-weight:600;border-radius:8px;cursor:pointer;}
.btn-next{flex:2;padding:14px;background:#E07B39;border:none;color:#fff;font-size:14px;font-weight:700;border-radius:8px;cursor:pointer;letter-spacing:.04em;transition:opacity .15s;}
.btn-next:disabled{background:#D5D0C8;color:#A09890;cursor:not-allowed;}
.btn-reset{width:100%;padding:14px;background:transparent;border:2px solid #1A2035;color:#1A2035;font-size:14px;font-weight:700;border-radius:8px;cursor:pointer;margin-top:4px;}

.divider{height:1px;background:#E8E4DC;margin:20px 0;}
.section-title{font-size:12px;font-weight:700;color:#1A2035;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}

@media print{
  .header,.steps,.nav,.btn-reset{display:none!important;}
  body{background:#fff;padding:0;}
  .wrap{padding:10px;}
  .mat-box,.res-dark,.warn-box,.info-box{break-inside:avoid;}
}
@media(max-width:500px){
  .mode-grid,.roof-grid,.renov-sub{grid-template-columns:1fr;}
  .fields-grid{grid-template-columns:1fr;}
  .res-grid-3{grid-template-columns:1fr 1fr;}
  .options-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <div>
      <div class="header-eyebrow">Outil gratuit — ÉtanchéiCheck</div>
      <div class="header-title">Calculateur de surface et de matériaux</div>
    </div>
  </div>
</div>

<div class="steps">
  <div class="steps-inner" id="stepsBar"></div>
</div>

<div class="wrap" id="content"></div>

<script>
// ─── DATA ─────────────────────────────────────────────────────────────────────

const STEPS_LABELS = ["Mode & Toiture","Dimensions","Résultats"];

const ROOFS = [
  { id:"terrasse", label:"Terrasse plate", desc:"Pente < 5%",
    icon:`<svg viewBox="0 0 60 40" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="4" y="14" width="52" height="6"/><line x1="4" y1="20" x2="4" y2="30"/><line x1="56" y1="20" x2="56" y2="30"/></svg>`,
    fields:["longueur","largeur"],
    calc:(f)=>({ s:f.longueur*f.largeur, p:2*(f.longueur+f.largeur) }) },
  { id:"monopente", label:"Toiture 1 pente", desc:"Pan incliné simple",
    icon:`<svg viewBox="0 0 60 40" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="4,30 4,10 56,20 56,30 4,30"/></svg>`,
    fields:["longueur","largeur","pente"],
    calc:(f)=>{ const r=Math.atan(f.pente/100); return { s:(f.longueur*f.largeur)/Math.cos(r), p:2*(f.longueur+f.largeur) }; } },
  { id:"bipente", label:"Toiture 2 pentes", desc:"Bâtière / toit en V",
    icon:`<svg viewBox="0 0 60 40" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="4,30 30,8 56,30 4,30"/><line x1="30" y1="8" x2="30" y2="30"/></svg>`,
    fields:["longueur","largeur","pente"],
    calc:(f)=>{ const r=Math.atan(f.pente/100); return { s:2*f.longueur*((f.largeur/2)/Math.cos(r)), p:2*(f.longueur+f.largeur) }; } },
  { id:"dome", label:"Dôme circulaire", desc:"Coupole / voûte",
    icon:`<svg viewBox="0 0 60 40" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4,30 Q30,4 56,30"/><line x1="4" y1="30" x2="56" y2="30"/></svg>`,
    fields:["rayon"],
    calc:(f)=>({ s:2*Math.PI*f.rayon*f.rayon, p:2*Math.PI*f.rayon }) },
  { id:"auvent", label:"Auvent / Marquise", desc:"Pente forte > 20%",
    icon:`<svg viewBox="0 0 60 40" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="4,8 56,8 56,32"/><line x1="4" y1="8" x2="4" y2="32"/><line x1="4" y1="32" x2="56" y2="32"/></svg>`,
    fields:["longueur","largeur","pente"],
    calc:(f)=>{ const r=Math.atan(f.pente/100); return { s:(f.longueur*f.largeur)/Math.cos(r), p:2*(f.longueur+f.largeur) }; } },
];

const FIELD_META = {
  longueur:{label:"Longueur",unit:"m"},
  largeur:{label:"Largeur",unit:"m"},
  pente:{label:"Pente",unit:"%"},
  rayon:{label:"Rayon",unit:"m"},
};

// ─── STATE ────────────────────────────────────────────────────────────────────

let S = {
  step: 1,
  mode: null,       // "neuf" | "renov"
  renovType: null,  // "depose" | "suri"
  roofId: null,
  fields: {},
  releve: 0.20,
  couches: 2,
  isolant: "laineroche",  // "laineroche"|"polystyrene"|"aucun"
  longCoupeBande: 1.20,   // 1.20 | 1.50
  longRouleauRenfort: 9,  // 8|9|10
  rollSize: 10,           // m² per membrane roll
  rollsPerPalette: 20,
  avecCheneau: false,
};

// ─── CALC ─────────────────────────────────────────────────────────────────────

function getRoof(){ return ROOFS.find(r=>r.id===S.roofId); }

function compute(){
  const roof = getRoof(); if(!roof) return null;
  const f={};
  for(const k of roof.fields){
    const v=parseFloat(S.fields[k]);
    if(!v||v<=0) return null;
    f[k]=v;
  }
  const {s, p} = roof.calc(f);
  const surfReleves = p * S.releve;
  const surfTotale = s + surfReleves;

  // Primaire
  const primaireToute = (S.mode==="renov" && S.renovType==="suri") || S.avecCheneau;
  const surfPrimaire = primaireToute ? surfTotale : surfReleves;
  const bidonsPrimaire = Math.ceil(surfPrimaire / 10);

  // Membrane couches
  const chute = 1.1;
  const rouleauxC1 = Math.ceil((surfTotale * chute) / S.rollSize);
  const palettesC1 = Math.ceil(rouleauxC1 / S.rollsPerPalette);
  const rouleauxC2 = S.couches>=2 ? Math.ceil((surfTotale * chute) / S.rollSize) : 0;
  const palettesC2 = S.couches>=2 ? Math.ceil(rouleauxC2 / S.rollsPerPalette) : 0;

  // Bandes de renfort
  const effCoverage = S.longCoupeBande - 0.05; // 5cm overlap
  const nbBandes = Math.ceil(p / effCoverage);
  const longTotaleRenfort = nbBandes * S.longCoupeBande;
  const rouleauxRenfort = Math.ceil(longTotaleRenfort / S.longRouleauRenfort);
  const bandesParRouleau = Math.floor(S.longRouleauRenfort / S.longCoupeBande);

  // Isolant (neuf seulement, ou dépose)
  const avecIsolant = S.isolant!=="aucun" && (S.mode==="neuf" || (S.mode==="renov" && S.renovType==="depose"));
  const isolantM2 = avecIsolant ? Math.ceil(s * 1.05) : 0;

  return {
    surfBrute: s, surfReleves, surfTotale, surfPrimaire,
    bidonsPrimaire,
    rouleauxC1, palettesC1,
    rouleauxC2, palettesC2,
    nbBandes, longTotaleRenfort, rouleauxRenfort, bandesParRouleau,
    isolantM2, avecIsolant,
    perimeter: p,
  };
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────

function canNext(){
  if(S.step===1) return !!S.mode && !!(S.mode==="neuf" || S.renovType) && !!S.roofId;
  if(S.step===2){
    const roof=getRoof(); if(!roof) return false;
    return roof.fields.every(k=>parseFloat(S.fields[k])>0);
  }
  return true;
}

function fmt(n){ return n.toFixed(2); }



// ─── RENDER ───────────────────────────────────────────────────────────────────

function render(){
  // Steps bar
  document.getElementById("stepsBar").innerHTML = STEPS_LABELS.map((s,i)=>{
    const n=i+1;
    let cls="step-tab";
    if(n===S.step) cls+=" active";
    else if(n<S.step) cls+=" done";
    const oc = n<S.step ? `onclick="goStep(${n})"` : "";
    return `<div class="${cls}" ${oc}><span class="step-num">${n}</span>${s}</div>`;
  }).join("");

  let html="";

  // ── STEP 1 ──────────────────────────────────────────────────────────────────
  if(S.step===1){
    html+=`<h2>Type de chantier & toiture</h2>
    <p class="subtitle">Choisissez le mode puis le type de toiture à traiter.</p>

    <div class="section-title">Mode de travaux</div>
    <div class="mode-grid">
      <button class="mode-btn${S.mode==='neuf'?' selected':''}" onclick="set('mode','neuf')">
        <div class="mode-icon">🏗️</div>
        <div class="mode-label">Neuf</div>
        <div class="mode-desc">Construction neuve ou surface vierge</div>
      </button>
      <button class="mode-btn${S.mode==='renov'?' selected':''}" onclick="set('mode','renov')">
        <div class="mode-icon">🔧</div>
        <div class="mode-label">Rénovation</div>
        <div class="mode-desc">Remplacement d'une étanchéité existante</div>
      </button>
    </div>`;

    if(S.mode==="renov"){
      html+=`<div class="section-title">Type de rénovation</div>
      <div class="renov-sub">
        <button class="renov-btn${S.renovType==='depose'?' selected':''}" onclick="set('renovType','depose')">
          <div class="renov-label">✅ Dépose complète <span style="font-size:11px;font-weight:400">(recommandé)</span></div>
          <div class="renov-detail">Enlèvement de l'ancienne étanchéité. Repart sur support sain, résultat garanti.</div>
        </button>
        <button class="renov-btn${S.renovType==='suri'?' selected':''}" onclick="set('renovType','suri')">
          <div class="renov-label">⚠️ Surimposition</div>
          <div class="renov-detail">Pose par-dessus l'existant. Solution économique mais résultat non garanti si support dégradé.</div>
        </button>
      </div>`;
      if(S.renovType==="suri"){
        html+=`<div class="warn-renov"><span>⚠️</span><span>En surimposition, le primaire est appliqué sur <strong>toute la surface</strong> pour adhérer à l'étanchéité existante. Si le support est dégradé, les problèmes peuvent réapparaître.</span></div>`;
      }
    }

    html+=`<div class="divider"></div>
    <div class="section-title">Type de toiture</div>
    <div class="roof-grid">
    ${ROOFS.map(r=>`
      <button class="roof-btn${S.roofId===r.id?' selected':''}" onclick="set('roofId','${r.id}')">
        <div class="roof-icon" style="color:${S.roofId===r.id?'#E07B39':'#1A2035'}">${r.icon}</div>
        <div class="roof-label">${r.label}</div>
        <div class="roof-desc">${r.desc}</div>
      </button>`).join("")}
    </div>`;
  }

  // ── STEP 2 ──────────────────────────────────────────────────────────────────
  else if(S.step===2){
    const roof=getRoof();
    const isSingle=roof.fields.length===1;
    html+=`<h2>Dimensions & options</h2>
    <p class="subtitle">${roof.label}${S.mode==="renov"?` — Rénovation (${S.renovType==="depose"?"dépose complète":"surimposition"})`:""}</p>

    <div class="fields-grid${isSingle?' single':''}">
    ${roof.fields.map(k=>`
      <div>
        <label class="field-label">${FIELD_META[k].label} <span class="accent">(${FIELD_META[k].unit})</span></label>
        <input type="number" min="0" step="0.1" placeholder="ex. 12.5"
          value="${S.fields[k]||''}"
          class="${S.fields[k]?'filled':''}"
          oninput="setField('${k}',this.value)">
      </div>`).join("")}
    </div>

    <div class="options-box">
      <div class="options-title">Paramètres de pose</div>
      <div class="options-grid">
        <div>
          <label class="field-label">Hauteur relevés <span class="accent">(m)</span></label>
          <input type="number" min="0.05" step="0.05" value="${S.releve}" oninput="set('releve',parseFloat(this.value)||0.2)">
          <div class="hint">Standard : 0.20 m</div>
        </div>
        <div>
          <label class="field-label">Nombre de couches</label>
          <div class="toggle-row">
            <button class="toggle-btn${S.couches===1?' active':''}" onclick="set('couches',1)">1 couche</button>
            <button class="toggle-btn${S.couches===2?' active':''}" onclick="set('couches',2)">2 couches</button>
          </div>
        </div>
        <div>
          <label class="field-label">Longueur coupe bande <span class="accent">(m)</span></label>
          <div class="toggle-row">
            <button class="toggle-btn${S.longCoupeBande===1.20?' active':''}" onclick="set('longCoupeBande',1.20)">1.20 m</button>
            <button class="toggle-btn${S.longCoupeBande===1.50?' active':''}" onclick="set('longCoupeBande',1.50)">1.50 m</button>
          </div>
          <div class="hint">Longueur de chaque bande de renfort</div>
        </div>
        <div>
          <label class="field-label">Longueur rouleau renfort <span class="accent">(m)</span></label>
          <div class="toggle-row">
            ${[8,9,10].map(n=>`<button class="toggle-btn${S.longRouleauRenfort===n?' active':''}" onclick="set('longRouleauRenfort',${n})">${n} m</button>`).join("")}
          </div>
        </div>
      </div>`;

    const showIsolant = S.mode==="neuf" || (S.mode==="renov" && S.renovType==="depose");
    if(showIsolant){
      html+=`
      <div style="margin-top:14px">
        <label class="field-label">Isolant</label>
        <div class="chip-row">
          <button class="chip${S.isolant==='laineroche'?' active':''}" onclick="set('isolant','laineroche')">Laine de roche</button>
          <button class="chip${S.isolant==='polystyrene'?' active':''}" onclick="set('isolant','polystyrene')">Polystyrène</button>
          <button class="chip${S.isolant==='aucun'?' active':''}" onclick="set('isolant','aucun')">Sans isolant</button>
        </div>
      </div>`;
    }

    html+=`
      <div style="margin-top:14px;padding-top:14px;border-top:1px solid #F0ECE5;">
        <label class="field-label">Options spécifiques</label>
        <div class="chip-row">
          <button class="chip${S.avecCheneau?' active':''}" onclick="set('avecCheneau',${!S.avecCheneau})">
            ${S.avecCheneau?'✅':'☐'} Avec chéneau
          </button>
        </div>
        ${S.avecCheneau?`<div class="hint" style="margin-top:8px;">Primaire appliqué sur toute la surface (sol + relevés) jusqu'au chéneau.</div>`:''}
      </div>`;

    html+=`</div>`;
  }

  // ── STEP 3 ──────────────────────────────────────────────────────────────────
  else if(S.step===3){
    const r=compute();
    if(!r){
      html=`<div style="text-align:center;padding:40px 20px;color:#9E9890">
        <div style="font-size:40px;margin-bottom:12px">📐</div>
        <p>Dimensions manquantes — revenez à l'étape précédente.</p>
        <button class="btn-back" style="margin-top:16px;max-width:200px" onclick="goStep(2)">← Retour</button>
      </div>`;
    } else {
      const isoLabel = {laineroche:"Laine de roche",polystyrene:"Polystyrène"}[S.isolant]||"";
      const modeLabel = S.mode==="neuf" ? "Neuf" : `Rénovation — ${S.renovType==="depose"?"Dépose complète":"Surimposition"}`;

      html+=`<h2>Résultats du calcul</h2>
      <p class="subtitle">${getRoof().label} · ${modeLabel}</p>

      <!-- SURFACES -->
      <div class="res-dark">
        <div class="res-eyebrow">Surfaces</div>
        <div class="res-grid-3">
          <div class="res-card"><div class="res-card-lbl">Surface brute</div><div class="res-card-val">${fmt(r.surfBrute)} m²</div></div>
          <div class="res-card"><div class="res-card-lbl">Relevés</div><div class="res-card-val">${fmt(r.surfReleves)} m²</div></div>
          <div class="res-card hl"><div class="res-card-lbl">Surface totale</div><div class="res-card-val">${fmt(r.surfTotale)} m²</div></div>
        </div>
      </div>

      <!-- MATÉRIAUX PRINCIPAUX -->
      <div class="mat-box">
        <div class="mat-header">Matériaux principaux</div>

        <div class="mat-row">
          <div>
            <div class="mat-lbl">Primaire d'adhérence</div>
            <div class="mat-detail">${(S.mode==="renov"&&S.renovType==="suri")||S.avecCheneau ? `Toute la surface${S.avecCheneau?" (avec chéneau)":""}` : "Sur relevés uniquement"} — ~${fmt(r.surfPrimaire)} m²</div>
          </div>
          <div class="mat-val">${r.bidonsPrimaire} bidon${r.bidonsPrimaire>1?"s":""}<div class="mat-sub">bidons de 10 L</div></div>
        </div>

        <div class="mat-row">
          <div>
            <div class="mat-lbl">Membrane — 1ère couche</div>
            <div class="mat-detail">${fmt(r.surfTotale*1.1)} m² avec 10% de chute</div>
          </div>
          <div class="mat-val">${r.rouleauxC1} rouleau${r.rouleauxC1>1?"x":""}<div class="mat-sub">${r.palettesC1} palette${r.palettesC1>1?"s":""} de ${S.rollsPerPalette}</div></div>
        </div>

        ${r.rouleauxC2>0?`
        <div class="mat-row">
          <div>
            <div class="mat-lbl">Membrane — 2ème couche</div>
            <div class="mat-detail">${fmt(r.surfTotale*1.1)} m² avec 10% de chute</div>
          </div>
          <div class="mat-val">${r.rouleauxC2} rouleau${r.rouleauxC2>1?"x":""}<div class="mat-sub">${r.palettesC2} palette${r.palettesC2>1?"s":""} de ${S.rollsPerPalette}</div></div>
        </div>`:""}

        ${r.isolantM2>0?`
        <div class="mat-row">
          <div>
            <div class="mat-lbl">Isolant — ${isoLabel}</div>
            <div class="mat-detail">Surface brute avec 5% de chute</div>
          </div>
          <div class="mat-val">${r.isolantM2} m²</div>
        </div>`:""}
      </div>

      <!-- BANDES DE RENFORT -->
      <div class="mat-box">
        <div class="mat-header">Bandes de renfort (relevés)</div>
        <div class="mat-row">
          <div>
            <div class="mat-lbl">Nombre de bandes à poser</div>
            <div class="mat-detail">Périmètre ${fmt(r.perimeter)} m ÷ ${(S.longCoupeBande-0.05).toFixed(2)} m utile (chevauchement 5 cm)</div>
          </div>
          <div class="mat-val">${r.nbBandes} bandes</div>
        </div>
        <div class="mat-row">
          <div>
            <div class="mat-lbl">Rouleaux de renfort nécessaires</div>
            <div class="mat-detail">${r.nbBandes} bandes × ${S.longCoupeBande} m = ${fmt(r.longTotaleRenfort)} m linéaires · ${r.bandesParRouleau} bandes/rouleau</div>
          </div>
          <div class="mat-val">${r.rouleauxRenfort} rouleau${r.rouleauxRenfort>1?"x":""}<div class="mat-sub">rouleaux de ${S.longRouleauRenfort} m × 30 cm</div></div>
        </div>
      </div>

      <!-- VIDÉOS -->
      <div class="mat-box">
        <div class="mat-header">📹 Visualiser la technique de pose</div>
        <div style="padding:16px 20px;">
          <p style="font-size:13px;color:#6B6560;margin-bottom:16px;line-height:1.5;">Ces vidéos réalisées par des professionnels vous montrent le geste réel en chantier — pose des bandes de renfort, chauffe des relevés, sens de pose bas → haut.</p>

          <div style="font-size:11px;font-weight:700;color:#1A2035;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">Terrain — Étancheurs Normands</div>
          <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px;">
            <a href="https://www.youtube.com/@lesetancheursnormands" target="_blank" rel="noopener"
              style="display:flex;align-items:center;gap:12px;padding:13px 16px;background:#F7F4EF;border:1px solid #E0DBD2;border-radius:8px;text-decoration:none;">
              <span style="font-size:20px;flex-shrink:0;">▶️</span>
              <div>
                <div style="font-size:14px;font-weight:700;color:#1A2035;">Chaîne complète — Les Étancheurs Normands</div>
                <div style="font-size:12px;color:#9E9890;margin-top:2px;">Vidéos de chantiers réels — pose membrane, relevés, bandes de renfort</div>
              </div>
            </a>
            <a href="https://www.youtube.com/watch?v=BwgL_YXryS4" target="_blank" rel="noopener"
              style="display:flex;align-items:center;gap:12px;padding:13px 16px;background:#F7F4EF;border:1px solid #E0DBD2;border-radius:8px;text-decoration:none;">
              <span style="font-size:20px;flex-shrink:0;">▶️</span>
              <div>
                <div style="font-size:14px;font-weight:700;color:#1A2035;">Une journée avec les Étancheurs Normands</div>
                <div style="font-size:12px;color:#9E9890;margin-top:2px;">Le quotidien d'un chantier d'étanchéité compressé en 8 minutes</div>
              </div>
            </a>
          </div>

          <div style="font-size:11px;font-weight:700;color:#1A2035;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">Tutoriels — Soprema (débutants)</div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            <a href="https://www.youtube.com/playlist?list=PLsLwUC__JTrkt0Q8l4tlyu0ZVs0z4TKYZ" target="_blank" rel="noopener"
              style="display:flex;align-items:center;gap:12px;padding:13px 16px;background:#EEF4FF;border:1px solid #BDD0F0;border-radius:8px;text-decoration:none;">
              <span style="font-size:20px;flex-shrink:0;">📚</span>
              <div>
                <div style="font-size:14px;font-weight:700;color:#1A2035;">Playlist — Étanchéité toitures-terrasses par Soprema</div>
                <div style="font-size:12px;color:#6B7A9E;margin-top:2px;">Bonnes pratiques pas à pas — référence officielle du secteur</div>
              </div>
            </a>
            <a href="https://www.youtube.com/watch?v=0wDs7pUlF0A" target="_blank" rel="noopener"
              style="display:flex;align-items:center;gap:12px;padding:13px 16px;background:#EEF4FF;border:1px solid #BDD0F0;border-radius:8px;text-decoration:none;">
              <span style="font-size:20px;flex-shrink:0;">▶️</span>
              <div>
                <div style="font-size:14px;font-weight:700;color:#1A2035;">Étanchéité bitumineuse toiture-terrasse autoprotégée</div>
                <div style="font-size:12px;color:#6B7A9E;margin-top:2px;">Soprema — mise en œuvre complète étape par étape</div>
              </div>
            </a>
            <a href="https://www.youtube.com/watch?v=5_d3nRHVr4c" target="_blank" rel="noopener"
              style="display:flex;align-items:center;gap:12px;padding:13px 16px;background:#EEF4FF;border:1px solid #BDD0F0;border-radius:8px;text-decoration:none;">
              <span style="font-size:20px;flex-shrink:0;">▶️</span>
              <div>
                <div style="font-size:14px;font-weight:700;color:#1A2035;">Alsan Flashing — étanchéité sans flamme pour relevés</div>
                <div style="font-size:12px;color:#6B7A9E;margin-top:2px;">Soprema — traitement des relevés, idéal pour novices</div>
              </div>
            </a>
            <a href="https://youtu.be/FX-cxSo349A" target="_blank" rel="noopener"
              style="display:flex;align-items:center;gap:12px;padding:13px 16px;background:#EEF4FF;border:1px solid #BDD0F0;border-radius:8px;text-decoration:none;">
              <span style="font-size:20px;flex-shrink:0;">▶️</span>
              <div>
                <div style="font-size:14px;font-weight:700;color:#1A2035;">Pose avec primaire sur toute la surface — chéneau inclus</div>
                <div style="font-size:12px;color:#6B7A9E;margin-top:2px;">Soprema — tutoriel recommandé par un étancheur professionnel</div>
              </div>
            </a>
          </div>
        </div>
      </div>

      <!-- INFOS MODE -->
      ${S.mode==="renov"&&S.renovType==="suri"?`
      <div class="warn-box"><span style="font-size:18px;flex-shrink:0">⚠️</span>
        <div class="warn-text">En surimposition, si l'étanchéité existante est dégradée ou décollée, les problèmes peuvent réapparaître. Une dépose complète reste la solution la plus fiable.</div>
      </div>`:""}

      <div class="info-box"><span style="font-size:18px;flex-shrink:0">ℹ️</span>
        <div class="info-text">Ces quantités sont indicatives (+10% inclus). Elles permettent de <strong>vérifier un devis</strong> et d'anticiper les commandes, mais ne remplacent pas un relevé sur site. Demandez toujours le détail des matériaux dans votre devis.</div>
      </div>

      <button class="btn-reset" onclick="resetApp()">← Nouveau calcul</button>
      <button class="btn-reset" onclick="window.print()" style="margin-top:10px;border-color:#E07B39;color:#E07B39;">🖨️ Imprimer / Sauvegarder les résultats</button>
      <div style="margin-top:24px;padding:14px 0;border-top:1px solid #E0DBD2;text-align:center;font-size:12px;color:#9E9890;">
        ÉtanchéiCheck — outil gratuit conçu par un technicien étancheur avec 15 ans d'expérience terrain.<br>
        Ces estimations sont indicatives et ne remplacent pas un relevé de métreur sur site.
      </div>`;
    }
  }

  // NAV
  if(S.step<3){
    html+=`<div class="nav">
      ${S.step>1?`<button class="btn-back" onclick="goStep(${S.step-1})">← Retour</button>`:""}
      <button class="btn-next" onclick="nextStep()" ${canNext()?"":"disabled"}>
        ${S.step===2?"Voir les résultats →":"Suivant →"}
      </button>
    </div>`;
  }

  document.getElementById("content").innerHTML = html;
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────

function set(k,v){
  S[k]=v;
  if(k==="mode"){ S.renovType=null; }
  render();
}
function setField(k,v){ S.fields[k]=v; render(); }
function goStep(n){ if(n<=S.step) { S.step=n; render(); } }
function nextStep(){ if(canNext()){ S.step++; render(); } }
function resetApp(){
  S={step:1,mode:null,renovType:null,roofId:null,fields:{},releve:0.20,couches:2,
     isolant:"laineroche",longCoupeBande:1.20,longRouleauRenfort:9,rollSize:10,rollsPerPalette:20,avecCheneau:false};
  render();
}

render();
</script>
</body>
</html>
